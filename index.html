<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produits</title>
  <style>
    .product-card {
      width: 200px;
      margin: 20px;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .product-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px 10px 0 0;
    }

    .product-card h2 {
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
    }

    .product-card p {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Produits</h1>
  <div id="product-container"></div>

  <script>
    const products = [
      {
        "name": "Cool Shirt",
        "description": "100% Cotton, comfortable and stylish",
        "image": "https://via.placeholder.com/200x150",
        "price": 19.99,
        "category": "Clothing"
      },
      {
        "name": "Smartphone",
        "description": "High-tech smartphone with advanced features",
        "image": "https://via.placeholder.com/200x150",
        "price": 599.99,
        "category": "Electronics"
      },
      {
        "name": "Book",
        "description": "Interesting book about history",
        "image": "https://via.placeholder.com/200x150",
        "price": 14.99,
        "category": "Books"
      }
    ];

    const container = document.getElementById('product-container');

    products.forEach((product) => {
      const productCard = `
        <div class="product-card">
          <img src="${product.image}" alt="${product.name}">
          <h2>${product.name}</h2>
          <p>${product.description}</p>
          <p>Price: $${product.price}</p>
          <p>Category: ${product.category}</p>
        </div>
      `;

      container.innerHTML += productCard;
    });
  </script>
</body>
</html>

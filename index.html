<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produits</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <style>
    body {
      font-family: 'Open Sans', sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
      background-color: #f9f9f9;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      margin: 20px;
    }

    .product-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px 10px 0 0;
    }

    .product-card h2 {
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
    }

    .product-card p {
      font-size: 14px;
      color: #666;
    }

    .product-card .price {
      font-size: 16px;
      font-weight: bold;
      color: #333;
    }

    .product-card .category {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Produits</h1>
    <div id="product-container"></div>
  </div>

  <script>
    const owner = 'YOUR_USERNAME';
    const repo = 'YOUR_REPO_NAME';
    const path = 'products'; // The folder where you'll add JSON files

    async function loadProducts() {
      // 1. Get the list of all files in the 'products' folder
      const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`);
      const files = await response.json();

      const container = document.getElementById('product-container');

      for (const file of files) {
        if (file.name.endsWith('.json')) {
          // 2. Fetch the actual content of each JSON file
          const productRes = await fetch(file.download_url);
          const product = await productRes.json();

          // 3. Render the product using the HTML template
          const productCard = `
            <div class="product-card">
              <img src="${product.image}" alt="${product.name}">
              <h2>${product.name}</h2>
              <p>${product.description}</p>
              <p class="price">Prix : $${product.price}</p>
              <p class="category">Catégorie : ${product.category}</p>
            </div>
          `;

          container.innerHTML += productCard;
        }
      }
    }

    loadProducts();
  </script>
</body>
</html>
